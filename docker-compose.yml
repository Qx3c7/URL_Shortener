services:
  # Główny węzeł Cassandry (Seed Node)
  cassandra-node1:
    image: cassandra:4.1
    container_name: cassandra-node1
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra-data1:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Drugi węzeł Cassandry dołączający do klastra
  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - CASSANDRA_SEEDS=cassandra-node1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=100M
    volumes:
      - cassandra-data2:/var/lib/cassandra
    depends_on:
      cassandra-node1:
        condition: service_healthy

  # Serwis do tworzenia linków (POST /shorten)
  write-service:
    build: ./write_service
    container_name: write-service
    ports:
      - "8000:8000"
    volumes:
      - ./write_service:/app
    depends_on:
      cassandra-node1:
        condition: service_healthy

  # Serwis do przekierowań (GET /{id})
  read-service:
    build: ./read_service
    container_name: read-service
    ports:
      - "8001:8000"
    volumes:
      - ./read_service:/app
    depends_on:
      cassandra-node1:
        condition: service_healthy

volumes:
  cassandra-data1:
  cassandra-data2: